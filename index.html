<link rel="apple-touch-icon" href="icon.png">
<script>
// Generate icon canvas and set as apple-touch-icon
(function(){
  const c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  const ctx = c.getContext('2d');
  // Background
  const bg = ctx.createLinearGradient(0,0,512,512);
  bg.addColorStop(0,'#1a1a2e');
  bg.addColorStop(1,'#2d2d4e');
  ctx.fillStyle = bg;
  const r = 100;
  ctx.beginPath();
  ctx.moveTo(r,0); ctx.lineTo(512-r,0);
  ctx.quadraticCurveTo(512,0,512,r);
  ctx.lineTo(512,512-r);
  ctx.quadraticCurveTo(512,512,512-r,512);
  ctx.lineTo(r,512);
  ctx.quadraticCurveTo(0,512,0,512-r);
  ctx.lineTo(0,r);
  ctx.quadraticCurveTo(0,0,r,0);
  ctx.fill();
  // Gold decorative line
  ctx.strokeStyle = '#d4a853';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(80,370); ctx.lineTo(432,370);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(80,374); ctx.lineTo(432,374);
  ctx.strokeStyle = 'rgba(212,168,83,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
  // "vocab" in script style
  ctx.fillStyle = '#d4a853';
  ctx.font = 'italic bold 148px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(212,168,83,0.4)';
  ctx.shadowBlur = 20;
  ctx.fillText('vocab', 256, 240);
  // subtitle
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(247,243,238,0.5)';
  ctx.font = '400 36px Georgia, serif';
  ctx.letterSpacing = '4px';
  ctx.fillText('單字本', 256, 420);
  const link = document.createElement('link');
  link.rel = 'apple-touch-icon';
  link.href = c.toDataURL('image/png');
  document.head.appendChild(link);
})();
</script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --paper: #f7f3ee;
    --cream: #ede8e0;
    --accent: #c84b31;
    --gold: #d4a853;
    --sage: #7a9e87;
    --muted: #8a8070;
    --card: #ffffff;
    --danger: #e05252;
    --success: #5a9e6f;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { font-family: 'DM Sans', sans-serif; background: var(--paper); color: var(--ink); height: 100%; overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 480px; margin: 0 auto; }

/* HEADER */
.header { background: var(–ink); padding: 14px 20px 10px; flex-shrink: 0; }
.header-row { display: flex; justify-content: space-between; align-items: center; }
.logo { font-family: ‘Playfair Display’, serif; color: var(–paper); font-size: 1.2rem; }
.logo span { color: var(–gold); }
.word-count { font-size: 0.73rem; color: var(–muted); margin-top: 3px; }
.word-count strong { color: var(–gold); }

/* NAV */
.nav { display: flex; background: var(–cream); border-bottom: 1px solid #ddd5c8; flex-shrink: 0; }
.nav-btn { flex: 1; padding: 12px 0; border: none; background: none; font-family: ‘DM Sans’, sans-serif; font-size: 0.8rem; font-weight: 500; color: var(–muted); cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
.nav-btn.active { color: var(–accent); border-bottom-color: var(–accent); }

.screen { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
.screen.active { display: flex; }

/* SHARED */
.field-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(–muted); margin-bottom: 6px; }
.field-group { display: flex; flex-direction: column; }
input[type=“text”], textarea { font-family: ‘DM Sans’, sans-serif; font-size: 1rem; border: 1.5px solid var(–cream); border-radius: 10px; padding: 12px 14px; background: var(–card); color: var(–ink); outline: none; transition: border-color 0.2s; }
input[type=“text”]:focus, textarea:focus { border-color: var(–accent); }
textarea { resize: none; height: 72px; }
.tag-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tag-chip { padding: 6px 14px; border-radius: 20px; border: 1.5px solid var(–cream); background: var(–card); font-size: 0.78rem; cursor: pointer; transition: all 0.15s; color: var(–muted); font-family: ‘DM Sans’, sans-serif; }
.tag-chip.selected { background: var(–ink); color: var(–gold); border-color: var(–ink); }
.btn-primary { background: var(–accent); color: white; border: none; border-radius: 12px; padding: 15px; font-family: ‘DM Sans’, sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; transition: opacity 0.2s; }
.btn-primary:active { opacity: 0.8; }
.btn-secondary { background: var(–cream); color: var(–ink); border: none; border-radius: 12px; padding: 14px; font-family: ‘DM Sans’, sans-serif; font-size: 0.95rem; font-weight: 500; cursor: pointer; width: 100%; }

/* ADD SCREEN */
.add-screen { padding: 20px; gap: 14px; }

/* LIST SCREEN */
.search-bar { padding: 12px 16px; background: var(–cream); border-bottom: 1px solid #ddd5c8; flex-shrink: 0; }
.search-bar input { width: 100%; font-size: 0.9rem; padding: 10px 14px; border-radius: 10px; }
.filter-chips { display: flex; gap: 8px; padding: 10px 16px; overflow-x: auto; flex-shrink: 0; background: var(–paper); border-bottom: 1px solid var(–cream); }
.filter-chips::-webkit-scrollbar { display: none; }
.filter-chip { padding: 5px 13px; border-radius: 20px; border: 1.5px solid #ddd5c8; background: var(–card); font-size: 0.74rem; white-space: nowrap; cursor: pointer; transition: all 0.15s; color: var(–muted); font-family: ‘DM Sans’, sans-serif; }
.filter-chip.active { background: var(–ink); color: var(–gold); border-color: var(–ink); }
.word-list { flex: 1; overflow-y: auto; padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }

.word-card { background: var(–card); border-radius: 14px; padding: 14px 16px; box-shadow: 0 1px 8px rgba(26,26,46,0.06); display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; animation: slideIn 0.2s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.word-card-left { flex: 1; min-width: 0; }
.word-en { font-family: ‘Playfair Display’, serif; font-size: 1.1rem; color: var(–ink); margin-bottom: 3px; }
.word-pos { font-size: 0.7rem; color: var(–accent); font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 4px; }
.word-zh { font-size: 0.85rem; color: var(–muted); line-height: 1.4; }
.word-note { font-size: 0.78rem; color: var(–sage); margin-top: 4px; font-style: italic; }
.word-meta { display: flex; align-items: center; gap: 6px; margin-top: 7px; flex-wrap: wrap; }
.word-tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 8px; background: var(–cream); color: var(–muted); }
.error-badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
.error-badge.zero { background: #eaf6ee; color: var(–success); }
.error-badge.low { background: #fff8e1; color: #b8860b; }
.error-badge.high { background: #fdecea; color: var(–danger); }

.word-card-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
.icon-btn { width: 32px; height: 32px; border-radius: 8px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; transition: all 0.15s; }
.icon-btn.del { background: #fdecea; color: var(–danger); }
.icon-btn.del:active { background: var(–danger); color: white; }
.icon-btn.edit { background: var(–cream); color: var(–muted); }
.empty-state { text-align: center; padding: 60px 30px; color: var(–muted); }
.empty-state .emoji { font-size: 2.5rem; margin-bottom: 12px; }
.empty-state p { font-size: 0.9rem; line-height: 1.6; }

/* STATS SCREEN */
.stats-screen { padding: 20px; gap: 14px; }
.stats-title { font-family: ‘Playfair Display’, serif; font-size: 1.4rem; }
.stats-title span { color: var(–accent); }

.stats-overview { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.stat-card { background: var(–card); border-radius: 14px; padding: 16px; text-align: center; box-shadow: 0 1px 8px rgba(26,26,46,0.06); }
.stat-num { font-family: ‘Playfair Display’, serif; font-size: 2rem; }
.stat-num.red { color: var(–danger); }
.stat-num.green { color: var(–success); }
.stat-num.gold { color: var(–gold); }
.stat-label { font-size: 0.72rem; color: var(–muted); margin-top: 3px; }

.section-title { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(–muted); margin-top: 6px; }

.weak-list { display: flex; flex-direction: column; gap: 8px; }
.weak-card { background: var(–card); border-radius: 12px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 6px rgba(26,26,46,0.05); }
.weak-card-left { flex: 1; }
.weak-en { font-family: ‘Playfair Display’, serif; font-size: 1rem; }
.weak-zh { font-size: 0.8rem; color: var(–muted); margin-top: 2px; }
.weak-errors { background: #fdecea; color: var(–danger); font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; }
.weak-errors.medium { background: #fff8e1; color: #b8860b; }

.reset-btn { background: none; border: 1.5px solid #ddd5c8; border-radius: 10px; padding: 10px 16px; font-family: ‘DM Sans’, sans-serif; font-size: 0.82rem; color: var(–muted); cursor: pointer; }
.reset-btn:active { background: var(–cream); }
.reset-row { display: flex; justify-content: flex-end; }

/* QUIZ SCREEN */
.quiz-setup { padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; flex: 1; }
.quiz-setup h2 { font-family: ‘Playfair Display’, serif; font-size: 1.4rem; }
.quiz-setup h2 span { color: var(–accent); }
.option-row { display: flex; gap: 8px; }
.option-btn { flex: 1; padding: 11px 0; border-radius: 10px; border: 1.5px solid var(–cream); background: var(–card); font-family: ‘DM Sans’, sans-serif; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; color: var(–muted); }
.option-btn.selected { background: var(–ink); color: var(–gold); border-color: var(–ink); }

.quiz-active { padding: 20px; display: flex; flex-direction: column; gap: 16px; flex: 1; }
.quiz-progress { display: flex; align-items: center; gap: 10px; }
.progress-bar { flex: 1; height: 6px; background: var(–cream); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: var(–accent); border-radius: 3px; transition: width 0.3s ease; }
.progress-text { font-size: 0.75rem; color: var(–muted); white-space: nowrap; }
.quiz-card { background: var(–card); border-radius: 18px; padding: 28px 22px; box-shadow: 0 2px 20px rgba(26,26,46,0.08); text-align: center; flex-shrink: 0; }
.quiz-mode-label { font-size: 0.7rem; letter-spacing: 0.8px; text-transform: uppercase; color: var(–muted); margin-bottom: 16px; }
.quiz-question { font-family: ‘Playfair Display’, serif; font-size: 1.7rem; color: var(–ink); margin-bottom: 8px; line-height: 1.3; }
.quiz-hint { font-size: 0.78rem; color: var(–muted); font-style: italic; }
.quiz-choices { display: flex; flex-direction: column; gap: 10px; }
.choice-btn { padding: 14px 16px; border-radius: 12px; border: 1.5px solid #e5ddd2; background: var(–card); font-family: ‘DM Sans’, sans-serif; font-size: 0.92rem; cursor: pointer; transition: all 0.15s; color: var(–ink); text-align: left; }
.choice-btn.correct { background: #eaf6ee; border-color: var(–success); color: var(–success); font-weight: 600; }
.choice-btn.wrong { background: #fdecea; border-color: var(–danger); color: var(–danger); }
.choice-btn.reveal { background: #eaf6ee; border-color: var(–success); color: var(–success); }
.choice-btn:disabled { cursor: default; }
.next-btn { background: var(–accent); color: white; border: none; border-radius: 12px; padding: 15px; font-family: ‘DM Sans’, sans-serif; font-size: 1rem; font-weight: 600; cursor: pointer; width: 100%; }
.next-btn:active { opacity: 0.8; }

.quiz-result { padding: 32px 24px; display: flex; flex-direction: column; align-items: center; gap: 16px; flex: 1; overflow-y: auto; }
.result-emoji { font-size: 3.5rem; }
.result-score { font-family: ‘Playfair Display’, serif; font-size: 3rem; color: var(–ink); }
.result-score span { color: var(–accent); }
.result-label { color: var(–muted); font-size: 0.9rem; }
.result-breakdown { background: var(–card); border-radius: 14px; padding: 16px 20px; width: 100%; display: flex; justify-content: space-around; }
.breakdown-item { text-align: center; }
.breakdown-num { font-family: ‘Playfair Display’, serif; font-size: 1.6rem; }
.breakdown-num.green { color: var(–success); }
.breakdown-num.red { color: var(–danger); }
.breakdown-label { font-size: 0.72rem; color: var(–muted); margin-top: 2px; }

/* wrong words list in result */
.result-wrong-title { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; color: var(–muted); align-self: flex-start; }
.result-wrong-list { width: 100%; display: flex; flex-direction: column; gap: 8px; }
.result-wrong-item { background: #fdecea; border-radius: 10px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; }
.rwi-en { font-family: ‘Playfair Display’, serif; font-size: 0.95rem; }
.rwi-zh { font-size: 0.78rem; color: var(–danger); margin-top: 2px; }
.rwi-count { font-size: 0.72rem; font-weight: 700; color: var(–danger); white-space: nowrap; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,26,46,0.5); z-index: 200; align-items: flex-end; }
.modal-overlay.open { display: flex; }
.modal { background: var(–paper); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; gap: 12px; max-height: 90dvh; overflow-y: auto; }
.modal-title { font-family: ‘Playfair Display’, serif; font-size: 1.1rem; margin-bottom: 4px; }

/* Toast */
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(–ink); color: var(–paper); padding: 10px 20px; border-radius: 20px; font-size: 0.85rem; transition: transform 0.3s ease; z-index: 999; white-space: nowrap; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(–cream); border-radius: 2px; }
</style>

</head>

  <!-- SCREEN: QUIZ -->

<div class="modal-overlay" id="editModal" onclick="if(event.target===this)closeEdit()">
  <div class="modal">
    <div class="modal-title">✏️ 編輯單字</div>
    <input type="hidden" id="editId">
    <div class="field-group"><div class="field-label">英文單字</div><input type="text" id="editEn"></div>
    <div class="field-group"><div class="field-label">中文意思</div><input type="text" id="editZh"></div>
    <div class="field-group"><div class="field-label">例句 / 備註</div><textarea id="editNote"></textarea></div>
    <button class="btn-primary" onclick="saveEdit()">儲存</button>
    <button class="btn-secondary" onclick="closeEdit()">取消</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY = 'vocab_v3';
let words = (() => { try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; } })();
const save = () => localStorage.setItem(KEY, JSON.stringify(words));

let selPos = '', selTag = '', activeFilter = 'all';
let qOpts = { dir: 'en', pool: 'all', count: 10 };
let qList = [], qIdx = 0, qScore = 0, wrongWords = [];

// ── NAV ──
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  ['list','add','quiz','stats'].forEach((n,i) => { if(n===name) document.querySelectorAll('.nav-btn')[i].classList.add('active'); });
  if (name === 'list') { renderChips(); renderList(); }
  if (name === 'quiz') backToSetup();
  if (name === 'stats') renderStats();
}

// ── CHIPS ──
function toggleChip(el, type, val) {
  const groupId = type === 'pos' ? 'posGroup' : 'tagGroup';
  document.querySelectorAll(`#${groupId} .tag-chip`).forEach(c => c.classList.remove('selected'));
  if (type === 'pos') { selPos = selPos === val ? '' : val; if (selPos) el.classList.add('selected'); }
  else { selTag = selTag === val ? '' : val; if (selTag) el.classList.add('selected'); }
}

// ── SAVE WORD ──
function saveWord() {
  const en = document.getElementById('inputEn').value.trim();
  const zh = document.getElementById('inputZh').value.trim();
  if (!en || !zh) { toast('請填寫英文單字和中文意思'); return; }
  words.push({ id: Date.now(), en, zh, pos: selPos, note: document.getElementById('inputNote').value.trim(), tag: selTag, errors: 0, correct: 0 });
  save();
  document.getElementById('inputEn').value = '';
  document.getElementById('inputZh').value = '';
  document.getElementById('inputNote').value = '';
  selPos = ''; selTag = '';
  document.querySelectorAll('#posGroup .tag-chip, #tagGroup .tag-chip').forEach(c => c.classList.remove('selected'));
  updateCount(); toast('✦ 單字已儲存！'); showScreen('list');
}

// ── LIST ──
function setFilter(tag, el) {
  activeFilter = tag;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderChips() {
  const tags = [...new Set(words.map(w => w.tag).filter(Boolean))];
  const c = document.getElementById('filterChips');
  c.innerHTML = `<button class="filter-chip ${activeFilter==='all'?'active':''}" onclick="setFilter('all',this)">全部</button>
    <button class="filter-chip ${activeFilter==='weak'?'active':''}" onclick="setFilter('weak',this)">⚠️ 常錯</button>`;
  tags.forEach(t => c.innerHTML += `<button class="filter-chip ${activeFilter===t?'active':''}" onclick="setFilter('${t}',this)">${t}</button>`);
}

function errorBadge(w) {
  const e = w.errors || 0;
  const total = (w.errors||0) + (w.correct||0);
  if (total === 0) return '';
  if (e === 0) return `<span class="error-badge zero">✓ 全對</span>`;
  if (e <= 2) return `<span class="error-badge low">錯 ${e} 次</span>`;
  return `<span class="error-badge high">錯 ${e} 次</span>`;
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const el = document.getElementById('wordList');
  let filtered = words.filter(w => {
    if (activeFilter === 'weak') return (w.errors || 0) >= 2;
    if (activeFilter !== 'all') return w.tag === activeFilter;
    return true;
  }).filter(w => !q || w.en.toLowerCase().includes(q) || w.zh.includes(q)).slice().reverse();

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state"><div class="emoji">${activeFilter==='weak'?'🎉':'📖'}</div><p>${
      activeFilter==='weak' ? '太棒了！沒有常錯的單字' :
      words.length ? '找不到符合的單字' : '還沒有單字<br>點「新增」開始建立你的單字本！'
    }</p></div>`;
    return;
  }
  el.innerHTML = filtered.map(w => `
    <div class="word-card">
      <div class="word-card-left">
        <div class="word-en">${w.en}</div>
        ${w.pos?`<div class="word-pos">${w.pos}</div>`:''}
        <div class="word-zh">${w.zh}</div>
        ${w.note?`<div class="word-note">${w.note}</div>`:''}
        <div class="word-meta">
          ${w.tag?`<span class="word-tag">${w.tag}</span>`:''}
          ${errorBadge(w)}
        </div>
      </div>
      <div class="word-card-actions">
        <button class="icon-btn edit" onclick="openEdit(${w.id})">✏️</button>
        <button class="icon-btn del" onclick="delWord(${w.id})">🗑️</button>
      </div>
    </div>`).join('');
}

function delWord(id) {
  words = words.filter(w => w.id !== id);
  save(); updateCount(); renderChips(); renderList(); toast('已刪除');
}

function updateCount() { document.getElementById('totalCount').textContent = words.length; }

// ── EDIT ──
function openEdit(id) {
  const w = words.find(x => x.id === id); if (!w) return;
  document.getElementById('editId').value = id;
  document.getElementById('editEn').value = w.en;
  document.getElementById('editZh').value = w.zh;
  document.getElementById('editNote').value = w.note || '';
  document.getElementById('editModal').classList.add('open');
}
function saveEdit() {
  const id = +document.getElementById('editId').value;
  const w = words.find(x => x.id === id); if (!w) return;
  w.en = document.getElementById('editEn').value.trim();
  w.zh = document.getElementById('editZh').value.trim();
  w.note = document.getElementById('editNote').value.trim();
  save(); closeEdit(); renderList(); toast('已更新');
}
function closeEdit() { document.getElementById('editModal').classList.remove('open'); }

// ── STATS ──
function renderStats() {
  const totalErrors = words.reduce((s,w) => s + (w.errors||0), 0);
  const totalCorrect = words.reduce((s,w) => s + (w.correct||0), 0);
  const totalAttempts = totalErrors + totalCorrect;
  const pct = totalAttempts ? Math.round(totalCorrect/totalAttempts*100) : 0;
  const weakWords = words.filter(w => (w.errors||0) >= 1).sort((a,b) => (b.errors||0)-(a.errors||0));

  document.getElementById('statsOverview').innerHTML = `
    <div class="stat-card"><div class="stat-num gold">${totalAttempts}</div><div class="stat-label">總作答次數</div></div>
    <div class="stat-card"><div class="stat-num green">${totalCorrect}</div><div class="stat-label">答對次數</div></div>
    <div class="stat-card"><div class="stat-num red">${totalErrors}</div><div class="stat-label">答錯次數</div></div>
    <div class="stat-card"><div class="stat-num ${pct>=70?'green':'red'}">${pct}%</div><div class="stat-label">整體正確率</div></div>`;

  const wl = document.getElementById('weakList');
  if (!weakWords.length) {
    wl.innerHTML = `<div class="empty-state"><div class="emoji">🏆</div><p>還沒有錯誤紀錄<br>完成測驗後這裡會顯示你的弱點</p></div>`;
    return;
  }
  wl.innerHTML = weakWords.slice(0, 20).map(w => {
    const e = w.errors || 0;
    return `<div class="weak-card">
      <div class="weak-card-left">
        <div class="weak-en">${w.en}</div>
        <div class="weak-zh">${w.zh}</div>
      </div>
      <span class="weak-errors ${e<=3?'medium':''}">${e} 次錯誤</span>
    </div>`;
  }).join('');
}

function confirmReset() {
  if (confirm('確定要重置所有錯誤紀錄嗎？')) {
    words.forEach(w => { w.errors = 0; w.correct = 0; });
    save(); renderStats(); renderList(); toast('已重置錯誤紀錄');
  }
}

// ── QUIZ ──
function setOpt(key, val, el) {
  qOpts[key] = val;
  document.querySelectorAll(`.quiz-setup .option-btn`).forEach(b => { if(b.getAttribute('onclick')?.includes(`'${key}'`)) b.classList.remove('selected'); });
  el.classList.add('selected');
}

function backToSetup() {
  document.getElementById('quizSetup').style.display = 'flex';
  document.getElementById('quizActive').style.display = 'none';
  document.getElementById('quizResult').style.display = 'none';
}

function startQuiz() {
  let pool = qOpts.pool === 'weak'
    ? words.filter(w => (w.errors||0) >= 1)
    : [...words];

  if (pool.length < 4) {
    toast(qOpts.pool === 'weak' ? '常錯單字不足 4 個，請先做測驗累積錯誤' : '至少需要 4 個單字才能測驗');
    return;
  }
  shuffle(pool);
  const cnt = qOpts.count === 'all' ? pool.length : Math.min(qOpts.count, pool.length);
  qList = pool.slice(0, cnt);
  qIdx = 0; qScore = 0; wrongWords = [];
  document.getElementById('quizSetup').style.display = 'none';
  document.getElementById('quizActive').style.display = 'flex';
  document.getElementById('quizResult').style.display = 'none';
  renderQ();
}

function renderQ() {
  const q = qList[qIdx];
  document.getElementById('progressFill').style.width = (qIdx / qList.length * 100) + '%';
  document.getElementById('progressText').textContent = `${qIdx+1} / ${qList.length}`;
  document.getElementById('nextBtn').style.display = 'none';

  if (qOpts.dir === 'en') {
    document.getElementById('quizLabel').textContent = '這個單字的中文意思是？';
    document.getElementById('quizQ').textContent = q.en;
    document.getElementById('quizHint').textContent = q.pos || '';
  } else {
    document.getElementById('quizLabel').textContent = '這個中文對應的英文單字是？';
    document.getElementById('quizQ').textContent = q.zh;
    document.getElementById('quizHint').textContent = '';
  }

  // Build 4 choices from full word pool
  let distractors = shuffle([...words.filter(w => w.id !== q.id)]).slice(0, 3);
  let choices = shuffle([q, ...distractors]);

  document.getElementById('answerArea').innerHTML = `<div class="quiz-choices">${choices.map(c => {
    const label = qOpts.dir === 'en' ? c.zh : c.en;
    return `<button class="choice-btn" data-id="${c.id}" onclick="pickMC(this,${c.id},${q.id})">${label}</button>`;
  }).join('')}</div>`;
}

function pickMC(el, pickedId, correctId) {
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  const w = words.find(x => x.id === correctId);
  if (pickedId === correctId) {
    el.classList.add('correct');
    qScore++;
    if (w) { w.correct = (w.correct||0) + 1; }
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('.choice-btn').forEach(b => { if (+b.dataset.id === correctId) b.classList.add('reveal'); });
    if (w) { w.errors = (w.errors||0) + 1; wrongWords.push(w); }
  }
  save();
  document.getElementById('nextBtn').style.display = 'block';
}

function nextQ() {
  qIdx++;
  if (qIdx >= qList.length) showResult();
  else renderQ();
}

function showResult() {
  document.getElementById('quizActive').style.display = 'none';
  document.getElementById('quizResult').style.display = 'flex';
  const total = qList.length;
  const pct = Math.round(qScore / total * 100);
  document.getElementById('resScore').textContent = qScore;
  document.getElementById('resTotal').textContent = total;
  document.getElementById('resCorrect').textContent = qScore;
  document.getElementById('resWrong').textContent = total - qScore;
  document.getElementById('resPct').textContent = pct + '%';
  document.getElementById('resEmoji').textContent = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '📚' : '💪';

  // Show wrong words summary
  const wt = document.getElementById('wrongListTitle');
  const wl = document.getElementById('wrongList');
  if (wrongWords.length) {
    wt.style.display = 'block';
    wl.innerHTML = wrongWords.map(w => `
      <div class="result-wrong-item">
        <div><div class="rwi-en">${w.en}</div><div class="rwi-zh">${w.zh}</div></div>
        <span class="rwi-count">累計錯 ${w.errors} 次</span>
      </div>`).join('');
  } else {
    wt.style.display = 'none';
    wl.innerHTML = '';
  }
}

// ── UTILS ──
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──
// Migrate old data without error/correct fields
words.forEach(w => { if (!('errors' in w)) w.errors = 0; if (!('correct' in w)) w.correct = 0; });
save();
updateCount(); renderChips(); renderList();
</script>

</body>
</html>
