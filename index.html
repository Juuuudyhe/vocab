<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>教甄單字本</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #f0ece4;
  --card: #ffffff;
  --header: #1a1a2e;
  --accent: #d4531a;
  --gold: #c8952a;
  --ink: #1a1a2e;
  --muted: #8a8070;
  --line: #e0dbd0;
  --pill-active: #1a1a2e;
  --green: #3a8a5a;
  --red: #c8392b;
  --font: 'Noto Sans TC', sans-serif;
}

html, body { height:100%; background:var(--bg); font-family:var(--font); color:var(--ink); }

/* ── SHELL ── */
.app { display:flex; flex-direction:column; height:100vh; max-width:480px; margin:0 auto; position:relative; background:var(--bg); }

/* ── TABLET ── */
@media (min-width: 768px) {
  body { background:#e0dace; }
  .app { flex-direction:row; max-width:100%; }
  .sidebar { display:flex; flex-direction:column; width:210px; min-width:210px; background:var(--header); height:100vh; flex-shrink:0; }
  .header { padding:28px 20px 20px; border-bottom:1px solid rgba(255,255,255,0.08); }
  .tabs { flex-direction:column; border-bottom:none; background:transparent; padding:10px 0; flex:1; }
  .tab { flex-direction:row; justify-content:flex-start; padding:13px 20px; gap:12px; border-bottom:none; border-left:3px solid transparent; color:rgba(255,255,255,0.5); font-size:14px; }
  .tab .tab-icon { font-size:18px; }
  .tab:hover { color:rgba(255,255,255,0.85); background:rgba(255,255,255,0.06); }
  .tab.active { color:#fff; border-left-color:var(--accent); background:rgba(255,255,255,0.08); border-bottom-color:transparent; }
  .content-area { flex:1; display:flex; flex-direction:column; overflow:hidden; background:var(--bg); }
  .page { padding:32px 40px; max-width:900px; }
  #wordList { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stats-grid { grid-template-columns:repeat(4,1fr); }
  #quizSetup, #quizActive, #quizResult { max-width:560px; }
  .modal-overlay { align-items:center; }
  .modal { border-radius:20px; max-width:520px; }
}

/* ── HEADER ── */
.header {
  background:var(--header);
  padding:20px 20px 16px;
  flex-shrink:0;
}
.header-title {
  font-size:22px; font-weight:700; color:#fff; letter-spacing:0.5px;
  margin-bottom:4px;
}
.header-title span { color:var(--gold); }
.header-sub { font-size:13px; color:rgba(255,255,255,0.5); }

/* ── TAB BAR ── */
.tabs {
  background:#fff;
  display:flex;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}
.tab {
  flex:1; padding:12px 4px 10px;
  font-size:12px; font-weight:500;
  color:var(--muted);
  border:none; background:none; cursor:pointer;
  border-bottom:2.5px solid transparent;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  transition:color .15s;
}
.tab .tab-icon { font-size:17px; }
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ── PAGES ── */
.page { display:none; flex:1; overflow-y:auto; padding:20px 16px; }
.page.active { display:block; }

/* ── SEARCH BAR ── */
.search-bar {
  background:#fff; border-radius:30px; display:flex; align-items:center;
  padding:10px 16px; gap:10px; margin-bottom:14px;
  box-shadow:0 1px 4px rgba(0,0,0,0.06);
}
.search-bar input {
  flex:1; border:none; outline:none; font-size:15px;
  font-family:var(--font); color:var(--ink); background:transparent;
}
.search-bar input::placeholder { color:var(--muted); }
.search-icon { color:var(--muted); font-size:16px; }

/* ── PILL FILTERS ── */
.pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.pill {
  padding:7px 16px; border-radius:30px; border:1.5px solid var(--line);
  background:#fff; font-size:13px; font-weight:500; color:var(--muted);
  cursor:pointer; transition:all .15s; white-space:nowrap;
  font-family:var(--font);
}
.pill.active { background:var(--pill-active); color:#fff; border-color:var(--pill-active); }
.pill.warning { border-color:#e8a020; color:#e8a020; }
.pill.warning.active { background:#e8a020; color:#fff; }

/* ── WORD LIST ── */
.word-item {
  background:#fff; border-radius:16px; padding:16px;
  margin-bottom:10px; display:flex; align-items:center; gap:14px;
  box-shadow:0 1px 4px rgba(0,0,0,0.05);
  position:relative; overflow:hidden;
}
.word-item::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:4px;
  background:var(--line);
}
.word-item.has-errors::before { background:var(--red); }
.word-item.clean::before { background:var(--green); }

.word-main { flex:1; min-width:0; }
.word-en { font-size:17px; font-weight:700; color:var(--ink); margin-bottom:2px; }
.word-pos-badge {
  display:inline-block; font-size:11px; color:var(--muted);
  background:var(--bg); padding:1px 7px; border-radius:10px;
  margin-left:6px; font-weight:400;
}
.word-zh { font-size:13px; color:var(--muted); }
.word-ex { font-size:12px; color:#aaa; font-style:italic; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.word-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }
.error-count {
  font-size:12px; font-weight:600; color:var(--red);
  background:rgba(200,57,43,0.08); padding:3px 9px; border-radius:20px;
}
.error-count.zero { color:var(--green); background:rgba(58,138,90,0.08); }
.word-actions { display:flex; gap:6px; }
.icon-btn {
  width:30px; height:30px; border-radius:8px; border:1.5px solid var(--line);
  background:#fff; cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
}
.icon-btn:hover { border-color:var(--accent); }

/* ── EMPTY STATE ── */
.empty { text-align:center; padding:80px 20px 40px; }
.empty-icon { font-size:48px; margin-bottom:14px; }
.empty h3 { font-size:17px; font-weight:600; margin-bottom:6px; color:var(--ink); }
.empty p { font-size:13px; color:var(--muted); }

/* ── ADD PAGE ── */
.form-section { margin-bottom:22px; }
.form-label { font-size:13px; font-weight:500; color:var(--muted); margin-bottom:8px; display:block; }
.form-label span { color:var(--accent); }

.form-input, .form-textarea {
  width:100%; padding:14px 16px; border-radius:14px;
  border:1.5px solid var(--line); background:#fff;
  font-size:15px; font-family:var(--font); color:var(--ink);
  outline:none; transition:border-color .15s;
}
.form-input:focus, .form-textarea:focus { border-color:var(--accent); }
.form-input::placeholder, .form-textarea::placeholder { color:#bbb; }
.form-textarea { resize:none; height:90px; line-height:1.5; }

.pos-pills { display:flex; gap:8px; flex-wrap:wrap; }
.pos-pill {
  padding:7px 14px; border-radius:30px; border:1.5px solid var(--line);
  background:#fff; font-size:13px; font-weight:500; color:var(--muted);
  cursor:pointer; transition:all .15s; font-family:var(--font);
}
.pos-pill.active { background:var(--pill-active); color:#fff; border-color:var(--pill-active); }

.tag-pills { display:flex; gap:8px; flex-wrap:wrap; }
.tag-pill {
  padding:7px 14px; border-radius:30px; border:1.5px solid var(--line);
  background:#fff; font-size:13px; font-weight:500; color:var(--muted);
  cursor:pointer; transition:all .15s; font-family:var(--font);
}
.tag-pill.active { background:var(--pill-active); color:#fff; border-color:var(--pill-active); }

/* ── QUIZ PAGE ── */
.quiz-section-title {
  font-size:22px; font-weight:700; margin-bottom:20px;
  color:var(--ink);
}
.quiz-section-title span { color:var(--accent); }

.quiz-group { margin-bottom:20px; }
.quiz-group-label { font-size:12px; font-weight:500; color:var(--muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
.quiz-toggle { display:flex; gap:10px; }
.toggle-btn {
  flex:1; padding:13px; border-radius:14px; border:1.5px solid var(--line);
  background:#fff; font-size:14px; font-weight:500; color:var(--muted);
  cursor:pointer; transition:all .15s; font-family:var(--font);
}
.toggle-btn.active { background:var(--pill-active); color:#fff; border-color:var(--pill-active); }
.toggle-btn.warning { border-color:#e8a020; color:#e8a020; }
.toggle-btn.warning.active { background:#e8a020; color:#fff; }

.count-btns { display:flex; gap:10px; }
.count-btn {
  flex:1; padding:13px; border-radius:14px; border:1.5px solid var(--line);
  background:#fff; font-size:14px; font-weight:500; color:var(--muted);
  cursor:pointer; transition:all .15s; font-family:var(--font);
}
.count-btn.active { background:var(--pill-active); color:#fff; border-color:var(--pill-active); }

/* ── STATS PAGE ── */
.stats-title {
  font-size:22px; font-weight:700; margin-bottom:20px; color:var(--ink);
}
.stats-title span { color:var(--accent); }

.stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px; }
.stat-card {
  background:#fff; border-radius:16px; padding:20px 16px;
  text-align:center; box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.stat-num { font-size:36px; font-weight:700; line-height:1.1; margin-bottom:6px; }
.stat-num.gold { color:var(--gold); }
.stat-num.green { color:var(--green); }
.stat-num.red { color:var(--red); }
.stat-num.pct { color:var(--red); font-size:28px; }
.stat-label { font-size:13px; color:var(--muted); font-weight:400; }

.weak-title { font-size:14px; font-weight:700; color:var(--ink); margin-bottom:12px; }

.weak-item {
  background:#fff; border-radius:12px; padding:14px 16px;
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:8px; box-shadow:0 1px 4px rgba(0,0,0,0.04);
}
.weak-word { font-size:15px; font-weight:600; }
.weak-zh { font-size:12px; color:var(--muted); margin-top:2px; }
.weak-badge {
  font-size:12px; font-weight:600; color:var(--red);
  background:rgba(200,57,43,0.08); padding:4px 10px; border-radius:20px;
}

/* ── CTA BUTTON ── */
.cta-btn {
  width:100%; padding:17px; border-radius:16px; border:none;
  background:var(--accent); color:#fff; font-size:16px; font-weight:700;
  font-family:var(--font); cursor:pointer; transition:all .15s;
  display:flex; align-items:center; justify-content:center; gap:8px;
  box-shadow:0 4px 16px rgba(212,83,26,0.3);
}
.cta-btn:active { transform:scale(0.98); }
.cta-btn.secondary {
  background:#fff; color:var(--ink); border:1.5px solid var(--line);
  box-shadow:none;
}
.cta-btn:disabled { opacity:0.5; cursor:not-allowed; }

/* ── QUIZ ACTIVE ── */
.quiz-progress-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; font-size:13px; color:var(--muted); }
.progress-bar { height:5px; background:var(--line); border-radius:3px; margin-bottom:20px; overflow:hidden; }
.progress-fill { height:100%; background:var(--accent); border-radius:3px; transition:width .3s; }

.quiz-card {
  background:#fff; border-radius:20px; padding:36px 24px;
  text-align:center; margin-bottom:16px;
  box-shadow:0 2px 12px rgba(0,0,0,0.08); min-height:160px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.quiz-prompt { font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-bottom:14px; }
.quiz-word { font-size:36px; font-weight:700; color:var(--ink); line-height:1.2; margin-bottom:6px; }
.quiz-pos { font-size:13px; color:var(--muted); }

.feedback { padding:11px 16px; border-radius:12px; font-size:14px; font-weight:600; text-align:center; margin-bottom:14px; display:none; }
.feedback.correct { background:rgba(58,138,90,0.1); color:var(--green); display:block; }
.feedback.wrong { background:rgba(200,57,43,0.08); color:var(--red); display:block; }

.mc-grid { display:flex; flex-direction:column; gap:10px; margin-bottom:16px; }
.mc-btn {
  width:100%; padding:15px; border-radius:14px; border:1.5px solid var(--line);
  background:#fff; font-size:15px; font-weight:500; color:var(--ink);
  cursor:pointer; transition:all .15s; font-family:var(--font); text-align:left;
}
.mc-btn:active:not(:disabled) { transform:scale(0.98); }
.mc-btn.correct { border-color:var(--green); background:rgba(58,138,90,0.08); color:var(--green); }
.mc-btn.wrong { border-color:var(--red); background:rgba(200,57,43,0.06); color:var(--red); }

.type-input {
  width:100%; padding:15px; border-radius:14px; border:2px solid var(--line);
  background:#fff; font-size:18px; font-family:var(--font); color:var(--ink);
  text-align:center; outline:none; transition:border-color .15s; margin-bottom:14px;
}
.type-input:focus { border-color:var(--accent); }
.type-input.correct { border-color:var(--green); color:var(--green); background:rgba(58,138,90,0.06); }
.type-input.wrong { border-color:var(--red); color:var(--red); background:rgba(200,57,43,0.05); }

.quiz-btn-row { display:flex; gap:10px; }
.quiz-btn-row .cta-btn { flex:1; padding:14px; font-size:15px; }

/* ── RESULT ── */
.result-card {
  background:#fff; border-radius:20px; padding:40px 24px;
  text-align:center; box-shadow:0 2px 12px rgba(0,0,0,0.08);
}
.result-emoji { font-size:52px; margin-bottom:16px; }
.result-score { font-size:56px; font-weight:700; color:var(--ink); line-height:1; }
.result-score sub { font-size:24px; color:var(--muted); font-weight:400; }
.result-pct { font-size:16px; color:var(--muted); margin:6px 0 24px; }
.result-row { display:flex; justify-content:center; gap:40px; margin-bottom:32px; }
.result-item strong { display:block; font-size:26px; font-weight:700; }
.result-item span { font-size:12px; color:var(--muted); }
.result-item.c strong { color:var(--green); }
.result-item.w strong { color:var(--red); }

/* ── RESET BUTTON ── */
.reset-btn {
  width:100%; padding:14px; border-radius:14px; border:1.5px solid var(--line);
  background:#fff; font-size:14px; font-weight:500; color:var(--muted);
  cursor:pointer; font-family:var(--font);
  display:flex; align-items:center; justify-content:center; gap:8px;
}

/* ── IO ── */
.io-card {
  background:#fff; border-radius:16px; padding:20px;
  margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,0.05);
}
.io-card h3 { font-size:16px; font-weight:700; margin-bottom:6px; }
.io-card p { font-size:13px; color:var(--muted); margin-bottom:14px; line-height:1.6; }

/* ── TOAST ── */
.toast {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:#fff; padding:10px 22px; border-radius:30px;
  font-size:14px; opacity:0; transition:all .25s; z-index:999; white-space:nowrap;
  pointer-events:none;
}
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ── EDIT MODAL ── */
.modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45);
  z-index:200; backdrop-filter:blur(3px);
  align-items:flex-end; justify-content:center;
}
.modal-overlay.open { display:flex; }
.modal {
  background:#fff; border-radius:24px 24px 0 0; padding:28px 20px 36px;
  width:100%; max-width:480px;
  animation:slideUp .25s ease;
}
@keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-title { font-size:18px; font-weight:700; margin-bottom:20px; }

input[type=file] { display:none; }

/* ── LOOKUP ── */
.lookup-row { display:flex; gap:8px; margin-bottom:0; }
.lookup-row .form-input { flex:1; }
.lookup-btn {
  padding:0 18px; border-radius:14px; border:none;
  background:var(--ink); color:#fff; font-size:14px; font-weight:600;
  font-family:var(--font); cursor:pointer; white-space:nowrap; flex-shrink:0;
  transition:all .15s;
}
.lookup-btn:active { transform:scale(0.97); }
.lookup-btn.ai { background:var(--accent); }
.lookup-result {
  background:#fff; border-radius:12px; padding:14px 16px;
  margin-top:10px; font-size:13px; color:var(--muted);
  border:1.5px solid var(--line); display:none; line-height:1.7;
}
.lookup-result.show { display:block; }
.lookup-result strong { color:var(--ink); }

/* ── SPEAK BTN ── */
.speak-btn {
  background:none; border:none; cursor:pointer; font-size:18px;
  padding:4px; opacity:0.6; transition:opacity .15s; vertical-align:middle;
}
.speak-btn:hover { opacity:1; }

/* ── TIMER BAR ── */
.timer-wrap { margin-bottom:10px; }
.timer-bar { height:4px; background:var(--line); border-radius:2px; overflow:hidden; }
.timer-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 1s linear; }
.timer-text { font-size:12px; color:var(--muted); text-align:right; margin-top:3px; }
.timer-text.urgent { color:var(--red); font-weight:600; }
</style>
</head>
<body>

<div class="app">

  <div class="sidebar">
  <!-- HEADER -->
  <div class="header">
    <div class="header-title">教甄<span>單字本</span></div>
    <div class="header-sub" id="headerSub">共 0 個單字</div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" onclick="goto('wordlist',this)"><span class="tab-icon">📚</span>單字本</button>
    <button class="tab" onclick="goto('add',this)"><span class="tab-icon">＋</span>新增</button>
    <button class="tab" onclick="goto('quiz',this)"><span class="tab-icon">🎯</span>測驗</button>
    <button class="tab" onclick="goto('stats',this)"><span class="tab-icon">📊</span>統計</button>
  </div>
  </div><!-- /sidebar -->

  <div class="content-area">
  <!-- ① WORDLIST -->
  <div class="page active" id="page-wordlist">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜尋單字…" oninput="renderList()">
    </div>
    <div class="pills">
      <button class="pill active" data-f="all" onclick="setFilter('all',this)">全部</button>
      <button class="pill warning" data-f="errors" onclick="setFilter('errors',this)">⚠️ 常錯</button>
    </div>
    <div id="wordList"></div>
  </div>

  <!-- ② ADD -->
  <div class="page" id="page-add">
    <div class="form-section">
      <label class="form-label">英文單字 <span>*</span></label>
      <div class="lookup-row">
        <input type="text" class="form-input" id="fEn" placeholder="e.g. curriculum">
        <button class="lookup-btn" onclick="lookupWord()">🔍 查詢</button>
        <button class="lookup-btn ai" onclick="aiLookup()">✦ AI</button>
      </div>
      <div class="lookup-result" id="lookupResult"></div>
    </div>
    <div class="form-section">
      <label class="form-label">詞性</label>
      <div class="pos-pills" id="posPills">
        <button class="pos-pill" data-pos="n." onclick="selPos(this)">n.</button>
        <button class="pos-pill" data-pos="v." onclick="selPos(this)">v.</button>
        <button class="pos-pill" data-pos="adj." onclick="selPos(this)">adj.</button>
        <button class="pos-pill" data-pos="adv." onclick="selPos(this)">adv.</button>
        <button class="pos-pill" data-pos="prep." onclick="selPos(this)">prep.</button>
        <button class="pos-pill" data-pos="phr." onclick="selPos(this)">phr.</button>
      </div>
    </div>
    <div class="form-section">
      <label class="form-label">中文意思 <span>*</span></label>
      <input type="text" class="form-input" id="fZh" placeholder="e.g. 課程；教學大綱">
    </div>
    <div class="form-section">
      <label class="form-label">例句 / 備註</label>
      <textarea class="form-textarea" id="fEx" placeholder="e.g. The curriculum focuses on critical thinking."></textarea>
    </div>
    <div class="form-section">
      <label class="form-label">分類標籤</label>
      <div class="tag-pills" id="tagPills">
        <button class="tag-pill" data-tag="教育" onclick="selTag(this)">教育</button>
        <button class="tag-pill" data-tag="教法" onclick="selTag(this)">教法</button>
        <button class="tag-pill" data-tag="行政" onclick="selTag(this)">行政</button>
        <button class="tag-pill" data-tag="閱讀" onclick="selTag(this)">閱讀</button>
        <button class="tag-pill" data-tag="寫作" onclick="selTag(this)">寫作</button>
        <button class="tag-pill" data-tag="口試" onclick="selTag(this)">口試</button>
      </div>
    </div>
    <input type="hidden" id="fEditIdx" value="">

<script type="module">
// ══ FIREBASE ══
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyArBnvVipV64_pjhTdC-6geAoH5rkrYIiU",
  authDomain: "vocab-a1d90.firebaseapp.com",
  projectId: "vocab-a1d90",
  storageBucket: "vocab-a1d90.firebasestorage.app",
  messagingSenderId: "392966335635",
  appId: "1:392966335635:web:3a9bc67bb30648bc80b166"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);
const DATA_DOC = doc(db, 'vocab', 'main');

let syncTimer = null;
let remoteListening = false;

// 推送到雲端（1秒防抖）
function pushToCloud() {
  clearTimeout(syncTimer);
  syncTimer = setTimeout(async () => {
    try {
      await setDoc(DATA_DOC, {
        words: JSON.stringify(words),
        totalAns: gTotalAns,
        totalC: gTotalC,
        updatedAt: Date.now()
      });
    } catch(e) { console.warn('雲端同步失敗', e); }
  }, 1000);
}

// 監聽雲端變化（即時同步）
function startCloudSync() {
  if (remoteListening) return;
  remoteListening = true;
  onSnapshot(DATA_DOC, (snap) => {
    if (!snap.exists()) return;
    const d = snap.data();
    const remoteWords = JSON.parse(d.words || '[]');
    // 只有雲端比本地新才更新
    if (d.updatedAt > (lastLocalUpdate || 0)) {
      words = remoteWords;
      gTotalAns = d.totalAns || 0;
      gTotalC   = d.totalC   || 0;
      localStorage.setItem('jy2_words', d.words);
      localStorage.setItem('jy2_totalAns', gTotalAns);
      localStorage.setItem('jy2_totalC',   gTotalC);
      renderList(); renderStats(); updateHeader();
      if (remoteListening) toast('☁️ 已從雲端同步');
    }
  });
}

let lastLocalUpdate = 0; // 0 = 開啟時先以雲端為主

// ══ DATA ══
let words = JSON.parse(localStorage.getItem('jy2_words') || '[]');
let gTotalAns = +localStorage.getItem('jy2_totalAns') || 0;
let gTotalC   = +localStorage.getItem('jy2_totalC')   || 0;

function persist() {
  lastLocalUpdate = Date.now();
  localStorage.setItem('jy2_words', JSON.stringify(words));
  localStorage.setItem('jy2_totalAns', gTotalAns);
  localStorage.setItem('jy2_totalC',   gTotalC);
  pushToCloud();
}

// 把所有 function 掛到 window 讓 HTML onclick 可以呼叫
window.goto = goto;
window.setFilter = setFilter;
window.selPos = selPos;
window.selTag = selTag;
window.saveWord = saveWord;
window.delWord = delWord;
window.openEdit = openEdit;
window.selMPos = selMPos;
window.closeModal = closeModal;
window.saveEdit = saveEdit;
window.selDir = selDir;
window.selScope = selScope;
window.selCount = selCount;
window.showSetup = showSetup;
window.startQuiz = startQuiz;
window.checkMC = checkMC;
window.checkType = checkType;
window.nextQ = nextQ;
window.resetErrors = resetErrors;
window.exportWords = exportWords;
window.importWords = importWords;

// ══ NAVIGATION ══
function goto(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'wordlist') renderList();
  if (name === 'stats') renderStats();
  if (name === 'add') resetAddForm();
  if (name === 'quiz') showSetup();
}

// ══ HEADER ══
function updateHeader() {
  document.getElementById('headerSub').textContent = `共 ${words.length} 個單字`;
}

// ══ FILTER ══
let currentFilter = 'all';
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

// ══ WORDLIST ══
function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  let list = words.filter(w => {
    const ms = !q || w.en.toLowerCase().includes(q) || w.zh.toLowerCase().includes(q);
    const mf = currentFilter === 'all' || (currentFilter === 'errors' && w.errors > 0);
    return ms && mf;
  });

  const el = document.getElementById('wordList');
  if (!list.length) {
    el.innerHTML = `<div class="empty">
      <div class="empty-icon">📖</div>
      <h3>${words.length === 0 ? '還沒有單字' : '找不到符合的單字'}</h3>
      <p>${words.length === 0 ? '點「新增」開始建立你的單字本！' : '試試其他關鍵字'}</p>
    </div>`;
    return;
  }

  el.innerHTML = list.map(w => {
    const ri = words.indexOf(w);
    const cls = w.errors > 0 ? 'has-errors' : (w.tested > 0 ? 'clean' : '');
    const errTxt = w.errors > 0 ? `錯誤 ${w.errors} 次` : w.tested > 0 ? `✓ ${w.tested} 次` : '未測';
    const errCls = w.errors > 0 ? '' : 'zero';
    return `<div class="word-item ${cls}">
      <div class="word-main">
        <div class="word-en">${w.en}${w.pos ? `<span class="word-pos-badge">${w.pos}</span>` : ''} <button class="speak-btn" data-word="${w.en}" onclick="speak(this.dataset.word)">🔊</button></div>
        <div class="word-zh">${w.zh}</div>
        ${w.example ? `<div class="word-ex">${w.example}</div>` : ''}
      </div>
      <div class="word-right">
        <span class="error-count ${errCls}">${errTxt}</span>
        <div class="word-actions">
          <button class="icon-btn" onclick="openEdit(${ri})">✏️</button>
          <button class="icon-btn" onclick="delWord(${ri})">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join('');

  updateHeader();
}

// ══ ADD FORM ══
let selPosVal = '', selTags = [];

function resetAddForm() {
  document.getElementById('fEn').value = '';
  document.getElementById('fZh').value = '';
  document.getElementById('fEx').value = '';
  document.getElementById('fEditIdx').value = '';
  selPosVal = ''; selTags = [];
  document.querySelectorAll('#posPills .pos-pill').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('#tagPills .tag-pill').forEach(p => p.classList.remove('active'));
}

function selPos(btn) {
  document.querySelectorAll('#posPills .pos-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  selPosVal = btn.dataset.pos;
}

function selTag(btn) {
  btn.classList.toggle('active');
  const t = btn.dataset.tag;
  selTags = selTags.includes(t) ? selTags.filter(x => x !== t) : [...selTags, t];
}

function saveWord() {
  const en = document.getElementById('fEn').value.trim();
  const zh = document.getElementById('fZh').value.trim();
  if (!en || !zh) { toast('請填寫英文單字和中文意思'); return; }

  const editIdx = document.getElementById('fEditIdx').value;
  if (editIdx !== '') {
    words[+editIdx] = { ...words[+editIdx], en, zh, pos: selPosVal,
      example: document.getElementById('fEx').value.trim(), tags: [...selTags] };
    toast('✅ 單字已更新');
  } else {
    if (words.find(w => w.en.toLowerCase() === en.toLowerCase())) { toast('⚠️ 此單字已存在'); return; }
    words.push({ en, zh, pos: selPosVal, example: document.getElementById('fEx').value.trim(),
      tags: [...selTags], errors: 0, tested: 0 });
    toast('✅ 已新增：' + en);
    resetAddForm();
  }
  persist(); updateHeader();
}

// ══ DELETE ══
function delWord(i) {
  if (!confirm(`確定刪除「${words[i].en}」？`)) return;
  words.splice(i, 1);
  persist(); renderList();
  toast('🗑️ 已刪除');
}

// ══ EDIT MODAL ══
function openEdit(i) {
  const w = words[i];
  document.getElementById('mEn').value = w.en;
  document.getElementById('mZh').value = w.zh;
  document.getElementById('mEx').value = w.example || '';
  document.getElementById('mIdx').value = i;
  document.querySelectorAll('#mPosPills .pos-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.pos === w.pos);
  });
  document.getElementById('mLookupResult').className = 'lookup-result';
  document.getElementById('editModal').classList.add('open');
}

function selMPos(btn) {
  document.querySelectorAll('#mPosPills .pos-pill').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
}

function closeModal() { document.getElementById('editModal').classList.remove('open'); }

function saveEdit() {
  const i = +document.getElementById('mIdx').value;
  const pos = document.querySelector('#mPosPills .pos-pill.active')?.dataset.pos || '';
  words[i] = { ...words[i],
    en: document.getElementById('mEn').value.trim(),
    zh: document.getElementById('mZh').value.trim(),
    example: document.getElementById('mEx').value.trim(),
    pos };
  persist(); closeModal(); renderList();
  toast('✅ 已更新');
}

// ══ QUIZ STATE ══
let qDir = 'en2zh', qScope = 'all', qCountOpt = '10';
let qQueue = [], qIdx = 0, qC = 0, qW = 0, qAnswered = false;
let currentWord = '';
window.__currentWord = () => currentWord;

function selDir(v, btn) { qDir = v; document.querySelectorAll('[data-dir]').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
function selScope(v, btn) { qScope = v; document.querySelectorAll('[data-scope]').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }
function selCount(v, btn) { qCountOpt = v; document.querySelectorAll('[data-n]').forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

function showSetup() {
  document.getElementById('quizSetup').style.display = '';
  document.getElementById('quizActive').style.display = 'none';
  document.getElementById('quizResult').style.display = 'none';
}

function startQuiz() {
  let pool = qScope === 'errors' ? words.filter(w => w.errors > 0) : [...words];
  if (pool.length < 2) { toast('⚠️ 至少需要 2 個單字才能測驗'); return; }
  shuffle(pool);
  const n = qCountOpt === 'all' ? pool.length : Math.min(+qCountOpt, pool.length);
  qQueue = pool.slice(0, n);
  qIdx = 0; qC = 0; qW = 0; qAnswered = false;
  document.getElementById('quizSetup').style.display = 'none';
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('quizActive').style.display = '';
  renderQ();
}

function renderQ() {
  if (qIdx >= qQueue.length) { showResult(); return; }
  qAnswered = false;
  const w = qQueue[qIdx];
  const total = qQueue.length;

  document.getElementById('qProg').textContent = `第 ${qIdx+1} / ${total} 題`;
  document.getElementById('qScr').textContent = `✓ ${qC}   ✗ ${qW}`;
  document.getElementById('qFill').style.width = (qIdx / total * 100) + '%';
  document.getElementById('qFeedback').className = 'feedback';
  document.getElementById('qWord').textContent = '';
  document.getElementById('qSpeak').style.display = 'none';

  const mcGrid = document.getElementById('mcGrid');
  const typeInp = document.getElementById('typeInp');
  const checkBtn = document.getElementById('checkBtn');
  const nextBtn = document.getElementById('nextBtn');
  const skipBtn = document.getElementById('skipBtn');
  nextBtn.style.display = 'none'; skipBtn.style.display = '';

  // 兩個方向都用四選一
  typeInp.style.display = 'none'; checkBtn.style.display = 'none';
  mcGrid.style.display = '';

  if (qDir === 'en2zh') {
    document.getElementById('qPrompt').textContent = '看英文，選中文意思';
      document.getElementById('qWord').textContent = w.en;
    document.getElementById('qSpeak').dataset.word = w.en;
    document.getElementById('qSpeak').style.display = '';
    const opts = buildOpts(w);
    mcGrid.innerHTML = opts.map(o =>
      `<button class="mc-btn" onclick="checkMC(this,'${esc(o.en)}','${esc(w.en)}')">${o.zh}</button>`
    ).join('');
  } else {
    document.getElementById('qPrompt').textContent = '看中文，選英文單字';
    document.getElementById('qWord').textContent = w.zh;
    document.getElementById('qSpeak').dataset.word = w.en;
    document.getElementById('qSpeak').style.display = '';
    document.getElementById('qPos').textContent = w.pos || '';
    const opts = buildOpts(w);
    mcGrid.innerHTML = opts.map(o =>
      `<button class="mc-btn" onclick="checkMC(this,'${esc(o.en)}','${esc(w.en)}')">${o.en}</button>`
    ).join('');
  }
}

function esc(s) { return s.replace(/'/g, "\\'"); }

function buildOpts(correct) {
  // 優先選同詞性的單字當干擾項
  const samePos = words.filter(w => w.en !== correct.en && w.pos === correct.pos && correct.pos !== '');
  const diffPos = words.filter(w => w.en !== correct.en && (w.pos !== correct.pos || correct.pos === ''));
  shuffle(samePos); shuffle(diffPos);
  // 盡量用同詞性填滿3個，不夠再用不同詞性補
  const distractors = [...samePos, ...diffPos].slice(0, 3);
  const opts = [correct, ...distractors];
  shuffle(opts);
  return opts;
}

function checkMC(btn, selectedEn, correctEn) {
  if (qAnswered) return;
  qAnswered = true;
  document.querySelectorAll('.mc-btn').forEach(b => b.disabled = true);
  const w = qQueue[qIdx];
  const wi = words.findIndex(x => x.en === w.en);
  words[wi].tested++;
  if (selectedEn === correctEn) {
    btn.className = 'mc-btn correct';
    setFeedback(true, '正確！🎉');
    qC++; gTotalC++;
  } else {
    btn.className = 'mc-btn wrong';
    document.querySelectorAll('.mc-btn').forEach(b => {
      if (b.getAttribute('onclick')?.includes(`'${esc(correctEn)}'`)) b.className = 'mc-btn correct';
    });
    setFeedback(false, qDir === 'en2zh' ? `錯誤！正確是：${w.zh}` : `錯誤！正確是：${w.en}`);
    words[wi].errors++; qW++;
  }
  gTotalAns++; persist();
  document.getElementById('nextBtn').style.display = '';
  document.getElementById('skipBtn').style.display = 'none';
}

function checkType() {
  if (qAnswered) { nextQ(); return; }
  qAnswered = true;
  const w = qQueue[qIdx];
  const wi = words.findIndex(x => x.en === w.en);
  const inp = document.getElementById('typeInp');
  const ans = inp.value.trim().toLowerCase();
  words[wi].tested++; gTotalAns++;
  if (ans === w.en.toLowerCase()) {
    inp.className = 'type-input correct';
    setFeedback(true, '正確！🎉');
    qC++; gTotalC++;
  } else {
    inp.className = 'type-input wrong';
    setFeedback(false, qDir === 'en2zh' ? `錯誤！正確是：${w.zh}` : `錯誤！正確是：${w.en}`);
    words[wi].errors++; qW++;
  }
  inp.disabled = true; persist();
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = '';
  document.getElementById('skipBtn').style.display = 'none';
}

function setFeedback(ok, msg) {
  const el = document.getElementById('qFeedback');
  el.className = 'feedback ' + (ok ? 'correct' : 'wrong');
  el.textContent = msg;
}

function nextQ() {
  if (!qAnswered) {
    const w = qQueue[qIdx];
    const wi = words.findIndex(x => x.en === w.en);
    if (wi >= 0) { words[wi].tested++; words[wi].errors++; gTotalAns++; }
    qW++; persist();
  }
  qIdx++;
  renderQ();
}

function showResult() {
  document.getElementById('quizActive').style.display = 'none';
  document.getElementById('quizResult').style.display = '';
  const total = qQueue.length;
  const pct = total ? Math.round(qC / total * 100) : 0;
  document.getElementById('resScore').innerHTML = `${qC}<sub>/${total}</sub>`;
  document.getElementById('resPct').textContent = pct + '%';
  document.getElementById('resC').textContent = qC;
  document.getElementById('resW').textContent = qW;
  document.getElementById('resEmoji').textContent = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📖';
  renderStats();
}

// ══ STATS ══
function renderStats() {
  const totalW = gTotalAns - gTotalC;
  const pct = gTotalAns ? Math.round(gTotalC / gTotalAns * 100) : 0;
  document.getElementById('sTotalAns').textContent = gTotalAns;
  document.getElementById('sTotalC').textContent = gTotalC;
  document.getElementById('sTotalW').textContent = totalW;
  document.getElementById('sPct').textContent = pct + '%';

  const weak = [...words].filter(w => w.errors > 0).sort((a,b) => b.errors - a.errors).slice(0, 8);
  const el = document.getElementById('weakList');
  if (!weak.length) {
    el.innerHTML = `<div class="empty" style="padding:40px 0 20px;">
      <div class="empty-icon">🏆</div>
      <h3>還沒有錯誤紀錄</h3>
      <p>完成測驗後這裡會顯示你的弱點</p>
    </div>`;
  } else {
    el.innerHTML = weak.map(w =>
      `<div class="weak-item">
        <div><div class="weak-word">${w.en}</div><div class="weak-zh">${w.zh}</div></div>
        <span class="weak-badge">錯誤 ${w.errors} 次</span>
      </div>`
    ).join('');
  }
  updateHeader();
}

function resetErrors() {
  if (!confirm('確定重置所有錯誤紀錄嗎？')) return;
  words.forEach(w => { w.errors = 0; w.tested = 0; });
  gTotalAns = 0; gTotalC = 0;
  persist(); renderStats();
  toast('🔄 已重置所有錯誤紀錄');
}

// ══ IMPORT / EXPORT ══
function exportWords() {
  if (!words.length) { toast('⚠️ 單字庫是空的'); return; }
  const blob = new Blob([JSON.stringify(words, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `教甄單字_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  toast('✅ 已匯出 ' + words.length + ' 個單字');
}

function importWords(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (!Array.isArray(data)) { toast('❌ 格式錯誤'); return; }
      let added = 0, updated = 0;
      data.forEach(w => {
        if (!w.en || !w.zh) return;
        const idx = words.findIndex(x => x.en.toLowerCase() === w.en.toLowerCase());
        if (idx >= 0) { words[idx] = { ...words[idx], ...w }; updated++; }
        else { words.push({ en: w.en, zh: w.zh, pos: w.pos||'', example: w.example||'', tags: w.tags||[], errors: w.errors||0, tested: w.tested||0 }); added++; }
      });
      persist(); renderList(); renderStats();
      toast(`✅ 新增 ${added}，更新 ${updated}`);
    } catch { toast('❌ 解析失敗'); }
    e.target.value = '';
  };
  reader.readAsText(file);
}


// ══ SPEAK ══
function speak(text) {
  if (!text || !text.trim()) return;
  if (!window.speechSynthesis) { toast('⚠️ 此裝置不支援發音'); return; }
  // iOS Safari requires cancel before speak
  window.speechSynthesis.cancel();
  // Small delay needed on iOS
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(text.trim());
    u.lang = 'en-US';
    u.rate = 0.85;
    u.pitch = 1;
    u.volume = 1;
    // Force load voices on iOS
    const voices = window.speechSynthesis.getVoices();
    const enVoice = voices.find(v => v.lang.startsWith('en'));
    if (enVoice) u.voice = enVoice;
    window.speechSynthesis.speak(u);
  }, 100);
}
window.speak = speak;

// ══ LOOKUP (Free Dictionary API) ══
async function lookupWord() {
  const en = document.getElementById('fEn').value.trim();
  if (!en) { toast('請先輸入英文單字'); return; }
  const res = document.getElementById('lookupResult');
  res.className = 'lookup-result show';
  res.innerHTML = '查詢中…';
  try {
    const r = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(en)}`);
    if (!r.ok) { res.innerHTML = '找不到這個單字，請確認拼法'; return; }
    const data = await r.json();
    const entry = data[0];
    const phonetic = entry.phonetic || entry.phonetics?.find(p=>p.text)?.text || '';
    let html = `<strong>${entry.word}</strong> ${phonetic ? `<span style="color:var(--muted)">${phonetic}</span>` : ''}`;

    // collect meanings
    entry.meanings?.slice(0,3).forEach(m => {
      const def = m.definitions[0];
      html += `<br><span style="background:var(--bg);padding:1px 7px;border-radius:8px;font-size:11px;margin-right:4px">${m.partOfSpeech}</span>${def.definition}`;
      if (def.example) html += `<br><em style="color:#aaa;font-size:12px">"${def.example}"</em>`;
      // auto fill example if empty
      if (def.example && !document.getElementById('fEx').value) {
        document.getElementById('fEx').value = def.example;
      }
    });

    // auto fill pos if empty
    if (!selPosVal && entry.meanings?.[0]) {
      const posMap = { noun:'n.', verb:'v.', adjective:'adj.', adverb:'adv.', preposition:'prep.' };
      const mapped = posMap[entry.meanings[0].partOfSpeech];
      if (mapped) {
        document.querySelectorAll('#posPills .pos-pill').forEach(p => {
          if (p.dataset.pos === mapped) { p.click(); }
        });
      }
    }
    res.innerHTML = html;
    speak(en);
  } catch(e) { res.innerHTML = '查詢失敗，請確認網路連線'; }
}
window.lookupWord = lookupWord;

function shuffle(arr) { for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; } }

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}
